# practice.yaml — per-practice branding, contact, and external resources.
#
# This is the file you edit to point the handout system at a *different practice*.
# `dosing.yaml` holds the clinical protocol (weight bands, dosing, locations);
# `practice.yaml` holds everything that's specific to who you are.
#
# A new practice should only need to edit:
#   1. `practice:` block — name, phone, logo, footer
#   2. `qr_targets:` block — YouTube + patient-portal links
#   3. `template_defaults.scc_maps_url` — see comment there
# …plus their own `dosing.yaml` and a logo PNG dropped in `templates/`.

practice:
  # Office phone — used in the rescue-plan "call our office at …" sentence
  # (build_contingency_block in render.py) and any other body-text reference.
  # phone_tel is the digits-only form for tel: links.
  phone: "(317) 338-9450"
  phone_tel: "3173389450"

  # 3-line stack displayed in the print PDF cover (between logo and mobile QR).
  cover_stack_en:
    - "Pediatric"
    - "Gastroenterology"
    - "(317) 338-9450"
  cover_stack_es:
    - "Gastroenterología"
    - "Pediátrica"
    - "(317) 338-9450"

  # Running footer (left side) on every print page.
  footer_en: "Pediatric Gastroenterology  ·  (317) 338-9450"
  footer_es: "Gastroenterología Pediátrica  ·  (317) 338-9450"

  # Medical disclaimer rendered as <aside class="medical-disclaimer"> below the
  # practice footer on every mobile + print handout. disclaimer_es is a working
  # draft pending native review — see REVIEW markers in templates.
  disclaimer_en: >-
    This information is general patient education and is not medical advice.
    Always follow the specific instructions provided by your child's physician.
    This content does not create a doctor-patient relationship. Consult your
    healthcare provider before making any changes to your child's prep regimen.
  disclaimer_es: >-
    Esta información es educación general para pacientes y no constituye
    asesoramiento médico. Siga siempre las instrucciones específicas
    proporcionadas por el médico de su hijo. Este contenido no crea una
    relación médico-paciente. Consulte a su proveedor de atención médica antes
    de realizar cualquier cambio en el régimen de preparación de su hijo.

  # Clickable doctor footer rendered on every mobile handout page
  # (combined-mobile, colonoscopy-mobile, egd-mobile, flex-sig-mobile).
  # Each entry: short name as it appears in the footer text + ascension
  # provider profile URL the patient lands on when they tap.
  # `id` is the stable slug used by the scheduler portal's physician_id field
  # (mirrored in app/schemas.py PhysicianId Literal). Don't rename without
  # coordinating that schema change.
  doctors:
    - id: "deivanayagam"
      name_short: "Dr. Deivanayagam"
      profile_url: "https://healthcare.ascension.org/find-care/provider/1528187192/sheela-deivanayagam"
    - id: "dunn"
      name_short: "Dr. Dunn"
      profile_url: "https://healthcare.ascension.org/find-care/provider/1649569419/rachel-dunn"
    - id: "schaefer"
      name_short: "Dr. Schaefer"
      profile_url: "https://healthcare.ascension.org/find-care/provider/1174652382/elizabeth-schaefer"
    - id: "tibesar"
      name_short: "Dr. Tibesar"
      profile_url: "https://healthcare.ascension.org/find-care/provider/1659527786/eric-tibesar"
    - id: "zavoian"
      name_short: "Dr. Zavoian"
      profile_url: "https://healthcare.ascension.org/find-care/provider/1568850261/sebastian-zavoian"

  # Practice/group logo. Path is RELATIVE to the templates/ directory.
  logo_filename: "giready-logo.png"
  logo_alt: "Pediatric Gastroenterology"

# Static QR targets — same target for both locations, may differ by language.
qr_targets:
  youtube_url_en: "https://www.youtube.com/watch?v=dT3HPrMFwDc"
  youtube_url_es: "https://youtube.com/playlist?list=PL0SsMsgRJwXXyWBiapEnUWdjKqtAeENCl&si=Arwj1l4KenD16T4f"
  portal_url:     "https://healthcare.ascension.org/patient-portal/indiana-ascension-st-vincent"
  gikids_url:     "https://gikids.org/tests-procedures/colonoscopy/"
  # Patient-facing medication checker — scanned/visited from the Medications
  # callout on every handout. Mirrors the scheduler-portal med YAML and lets
  # families verify any drug not listed by name on the printed handout.
  meds_giready_url: "https://meds.giready.com"

# Maps URL embedded in the original DOCX templates' placeholder Maps QR PNG.
# render.py uses this for byte-match identification when swapping in per-location Maps QRs.
# Don't change this unless you regenerate the DOCX templates' Maps QR images.
template_defaults:
  scc_maps_url: "https://maps.app.goo.gl/nD86YApcywibXFHfA"
