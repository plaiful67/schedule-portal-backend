<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>{{HTML_TITLE}}</title>
<link rel="alternate" hreflang="en" href="./">
<link rel="alternate" hreflang="es" href="{{LANG_TOGGLE_HREF}}">
<style>/*GI-MOBILE-TOKENS*/
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
:root{
  /* landing-only overrides; base Calm tokens come from shared/mobile-tokens.css */
  --r:20px; --r-sm:14px;
  --shadow-lg:0 10px 26px rgba(34,50,61,.10),0 30px 60px -34px rgba(30,86,99,.30);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.container{max-width:920px;margin:0 auto;padding:0 20px 40px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(251,247,241,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
.topbar::after{content:"";display:block;height:3px;background:linear-gradient(90deg,var(--teal),var(--green))}
.topbar-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 20px;font-family:var(--sans);font-size:13px}
.topbar-logo{height:46px;width:auto;flex:0 0 auto;display:block}
.topbar-logo-link{display:inline-flex;align-items:center;flex:0 0 auto}
.topbar-practice{flex:1 1 auto;text-align:center;line-height:1.2;color:var(--ink);font-weight:600}
.topbar-practice a{color:var(--teal);text-decoration:none}
.topbar-practice .phone{font-weight:500}
.lang-toggle{flex:0 0 auto;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--ink-soft);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:6px 13px;background:var(--card)}
.breadcrumb{font-family:var(--sans);font-size:14px;margin:20px 0 0;color:var(--ink-soft)}
.breadcrumb a{color:var(--ink-soft);text-decoration:none;font-weight:600}
h1{font-family:var(--serif);font-weight:500;font-size:clamp(32px,5.5vw,46px);color:var(--ink);margin:16px 0 6px;line-height:1.06;letter-spacing:-.015em}
.subtitle{font-family:var(--sans);font-size:16px;color:var(--ink-soft);font-weight:500;margin:0 0 4px}
.picker-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:26px 0 0}
@media(min-width:560px){.picker-grid{grid-template-columns:1fr 1fr}}
.band{position:relative;display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 22px;color:var(--ink);text-decoration:none;box-shadow:var(--shadow);transition:transform .22s cubic-bezier(.2,.7,.2,1),box-shadow .22s,border-color .2s;overflow:hidden}
.band:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--line-strong)}
.band::before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:linear-gradient(180deg,var(--teal),var(--green));opacity:0;transition:opacity .22s}
.band:hover::before{opacity:1}
.band .info{flex:1;min-width:0}
.band .info h2{font-family:var(--serif);font-weight:600;font-size:24px;line-height:1.08;letter-spacing:-.01em;color:var(--ink)}
.band .info .kg{font-family:var(--sans);font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-top:4px}
.band .info .tag{display:inline-block;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--coral-deep);background:var(--coral-soft);padding:3px 10px;border-radius:999px;margin-top:9px}
.band .arr{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;transition:transform .22s}
.band:hover .arr{transform:translateX(3px)}
.band .arr svg{width:15px;height:15px}
.band.wide{grid-column:1 / -1}
.footer{font-family:var(--sans);text-align:center;color:var(--ink-soft);font-size:13px;margin-top:44px;padding-top:18px;border-top:1px solid var(--line);line-height:1.7}
.footer a{color:var(--teal)}
.footer-copyright{font-family:var(--sans);margin:8px 0 4px;text-align:center;font-size:12px;color:var(--ink-faint)}
.footer-policy-links{font-family:var(--sans);margin:10px 0 8px;text-align:center;font-size:13px;font-weight:600}
.footer-policy-links a{color:var(--teal);text-decoration:none}
.footer-policy-links .sep{color:var(--line-strong);margin:0 8px}
.medical-disclaimer{font-family:var(--sans);margin-top:16px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;line-height:1.5;color:var(--ink-faint);max-width:760px;margin-left:auto;margin-right:auto}
@media print{.medical-disclaimer{color:#333;border-top:1px solid #888}}
@media(max-width:680px){.band.wide{grid-column:auto}}
@media (prefers-reduced-motion: reduce){.band,.band .arr{transition:none}.band:hover{transform:none}.band:hover .arr{transform:none}.band:hover::before{opacity:0}}
@media (prefers-color-scheme: dark){
  :root{color-scheme:dark;
    --paper:#16181b; --paper-2:#1b1e21; --card:#202327;
    --ink:#f5f5f4; --ink-soft:#c3cad0; --ink-faint:#97a0a8;
    --line:#353a40; --line-soft:#2a2d31; --line-strong:#4a5158;
    --teal:#5cc8b8; --teal-deep:#8fe0d2; --teal-tint:#123633;
    --coral:#f0905f; --coral-soft:#3b2419; --coral-deep:#f6ab84;
    --green:#6fd49a;
    --shadow-sm:none; --shadow:0 8px 24px rgba(0,0,0,.5); --shadow-lg:0 18px 44px rgba(0,0,0,.6);
  }
  .topbar{background:rgba(22,24,27,.85)}
  .topbar-logo{background:#f4f7fa;border-radius:8px;padding:2px 6px}
  .band .arr{color:#15110d}
}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="https://giready.com/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://giready.com/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://giready.com/apple-touch-icon.png">
<!-- No manifest on handout pages: the apex site.webmanifest declares start_url:"/" + display:standalone and is served with ACAO:*, which would hijack Add-to-Home-Screen to open giready.com standalone — losing the page AND the personalization hash. Without a manifest, A2HS bookmarks the current URL (hash included), in the browser, which is exactly what we teach. -->
<meta name="apple-mobile-web-app-title" content="GI Ready">
<meta name="theme-color" content="#2E7C8A">
</head>

</div>
</body>
</html>
