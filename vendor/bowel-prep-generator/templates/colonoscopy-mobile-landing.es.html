<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>{{HTML_TITLE}}</title>
<link rel="alternate" hreflang="en" href="{{LANG_TOGGLE_HREF}}">
<link rel="alternate" hreflang="es" href="./">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap');
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "Source Serif 4", Georgia, "Times New Roman", Times, serif;
    color: #22303f;
    line-height: 1.5;
    background: #f4f7fa;
    font-size: 17px;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 14px 32px; }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(16,42,67,0.06);
  }
.topbar::after {
    content: "";
    display: block;
    height: 3px;
    background: linear-gradient(90deg, #14366e, #1f5fa8 45%, #1d9a8a);
  }
  .topbar-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 8px 14px;
    font-family: "Inter", sans-serif; font-size: 13px;
  }
  .topbar-logo {
  height: 48px;
  width: auto;
  flex: 0 0 auto;
  display: block;
}
.topbar-logo-link {
  display: inline-flex;
  align-items: center;
  flex: 0 0 auto;
  text-decoration: none;
}
  .topbar-practice { flex: 1 1 auto; text-align: center; line-height: 1.15; color: #14366e; font-weight: 600; }
  .topbar-practice a { color: #1f5fa8; text-decoration: none; }
  .topbar-practice .phone { font-weight: 500; color: #51606f; }
  .lang-toggle {
    flex: 0 0 auto;
    font-family: "Inter", sans-serif; font-size: 12px; font-weight: 600;
    color: #1f5fa8; text-decoration: none;
    border: 1px solid #d7e0e8; border-radius: 999px; padding: 5px 12px;
    background: #fff;
  }
  h1 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 28px; color: #14366e;
    margin: 18px 0 4px; font-weight: 700; letter-spacing: -0.01em;
  }
  .subtitle {
    font-family: "Inter", sans-serif;
    font-size: 15px; color: #51606f; font-weight: 500;
    margin: 0 0 18px;
  }
  .picker-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin: 0 0 20px;
  }
  @media (min-width: 480px) {
    .picker-grid { grid-template-columns: 1fr 1fr; }
  }
  .band-card {
    display: block;
    text-decoration: none;
    background: #ffffff;
    border: 1px solid #d7e0e8;
    border-radius: 10px;
    padding: 14px 16px;
    color: #22303f;
    transition: background 0.1s ease;
  }
  .band-card:active { background: #f0f4f8; }
  .band-card .band-label {
    font-family: "Inter", sans-serif;
    font-size: 18px; font-weight: 700; color: #14366e;
    line-height: 1.2;
  }
  .band-card .band-lb-inline {
    display: inline-block;
    font-family: "Inter", sans-serif;
    font-size: 16px; font-weight: 700; color: #b03a00;
    margin-left: 4px;
    letter-spacing: -0.005em;
  }
  .band-card .band-note {
    font-family: "Inter", sans-serif;
    font-size: 13px; color: #51606f; font-weight: 500;
    margin-top: 3px;
  }
  .band-card .band-arrow {
    font-family: "Inter", sans-serif;
    font-size: 13px; font-weight: 600; color: #1f5fa8;
    margin-top: 8px;
  }
  .footer {
    text-align: center; color: #51606f; font-size: 12px;
    margin-top: 28px; padding-top: 14px; border-top: 1px solid #d7e0e8;
    line-height: 1.6;
  }
  @media (prefers-color-scheme: dark) {
    .weight-subtitle, .subtitle, .location .arrival { color: #ff9b6b; }
    body { background: #15181c; color: #e0e0e0; }
    .topbar { background: #1e2329; border-bottom-color: #323a44; }
    .topbar-logo { background: #f4f7fa; border-radius: 8px; padding: 2px 6px; }
    .topbar-practice { color: #e0e0e0; }
    .topbar-practice .phone { color: #bbb; }
    .topbar-practice a { color: #6db1f2; }
    .lang-toggle { background: #232a31; border-color: #46525f; color: #6db1f2; }
    h1 { color: #e0e0e0; }
    .subtitle { color: #bbb; }
    .band-card { background: #1e2329; border-color: #323a44; color: #e0e0e0; }
    .band-card:active { background: #2f3a48; }
    .band-card .band-label { color: #e0e0e0; }
    .band-card .band-lb-inline { color: #ff9b6b; }
    .band-card .band-note { color: #bbb; }
    .band-card .band-arrow { color: #6db1f2; }
    .footer { color: #888; border-top-color: #323a44; }
  }

  .breadcrumb {
    font-family: "Inter", sans-serif; font-size: 13px;
    margin: 14px 0 6px; color: #51606f;
  }
  .breadcrumb a { color: #1f5fa8; text-decoration: none; padding: 6px 0; display: inline-block; }
  .breadcrumb a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) {
    .breadcrumb { color: #bbb; }
    .breadcrumb a { color: #6db1f2; }
  }

.medical-disclaimer {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #d7e0e8;
  font-size: 0.85em;
  line-height: 1.45;
  color: #51606f;
}
@media print {
  .medical-disclaimer {
    color: #333;
    border-top: 1px solid #888;
  }
}

.footer-policy-links {
  margin: 12px 0 8px;
  text-align: center;
  font-size: 0.85em;
}
.footer-policy-links a {
  color: #1f5fa8;
  text-decoration: none;
}
.footer-policy-links a:hover { text-decoration: underline; }
.footer-policy-links .sep { color: #999; margin: 0 6px; }

.footer-copyright {
  margin: 6px 0 4px;
  text-align: center;
  font-size: 0.8em;
  color: #888;
}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="https://giready.com/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://giready.com/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://giready.com/apple-touch-icon.png">
<link rel="manifest" href="https://giready.com/site.webmanifest">
<meta name="theme-color" content="#1A3F8C">
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a href="https://giready.com/" class="topbar-logo-link" aria-label="giready.com home"><img class="topbar-logo" src="https://giready.com/giready-logo.png" alt="GI Ready"></a>
    <div class="topbar-practice">
      Gastroenterología Pediátrica<br>
      <span class="phone"><a href="tel:3173389450">(317) 338-9450</a></span>
    </div>
    <a class="lang-toggle" href="{{LANG_TOGGLE_HREF}}">English</a>
  </div>
</div>

<div class="container">
<div class="breadcrumb"><a href="https://giready.com/" target="_blank" rel="noopener">← Volver a giready.com</a></div>

<h1>Preparación para Colonoscopia</h1>
<div class="subtitle">Toque la banda de peso de su hijo(a)</div>

<div class="picker-grid">
{{BAND_CARDS}}
</div>

<div class="footer">
  Gastroenterología Pediátrica<br>
  Oficina: <a href="tel:3173389450">(317) 338-9450</a>
</div><p class="footer-copyright">&copy; 2026</p>

<!-- REVIEW: native ES review pending on disclaimer_es -->
<nav class="footer-policy-links" aria-label="Políticas del sitio"><a href="https://giready.com/es/privacidad/">Política de Privacidad</a><span class="sep" aria-hidden="true">·</span><a href="https://giready.com/es/terminos/">Términos de Uso</a></nav>
<aside class="medical-disclaimer" role="note" aria-label="Aviso médico">{{DISCLAIMER}}</aside>



</div>
</body>
</html>
