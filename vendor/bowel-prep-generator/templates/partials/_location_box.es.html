<section class="location">
  <div class="location-text">
    <div class="label">Lugar del Procedimiento</div>
    <div class="name">{{LOCATION_NAME}}</div>
    <div class="addr"><a href="{{MAPS_URL}}" target="_blank" rel="noopener">{{LOCATION_ADDRESS}}</a></div>
    <div class="addr">{{LOCATION_PHONE_LABEL}}: <a href="tel:{{LOCATION_PHONE_TEL}}"><strong>{{LOCATION_PHONE}}</strong></a></div>
    <div class="arrival">{{LOCATION_ARRIVAL}}</div>
  </div>
  <div class="location-qr">
    <a class="qr-block" href="{{MAPS_URL}}" target="_blank" rel="noopener">
      <span class="qr-caption">Escanee para Google Maps</span>
      <img id="qr-maps" src="qr-placeholder.png" alt="Indicaciones en Google Maps — código QR">
    </a>
  </div>
</section>
