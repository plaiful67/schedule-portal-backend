    protocol: standard
    label_en: "15-20 kg (33-44 lb)"
    label_es: "15-20 kg (33-44 lb)"
    html_title_en: "Colonoscopy Bowel Preparation Instructions - Children 15-20 kg"
    html_title_es: "Instrucciones de Preparación Intestinal para Colonoscopia - Niños de 15-20 kg"
    docx_heading_en: "Children 15-20 kg (33-44 lb)"
    docx_heading_es: "Niños de 15-20 kg (33-44 lb)"
    mobile_path: "u20kg"
    filename_stem: "15-20kg"
    folder_en: "15-20 kg (33-44 Lb)"
    folder_es: "15-20 kg (33-44 Lb)"
    include_glp1_warning: false
    dulcolax_tablets: 1
    dulcolax_bedtime_tablets: 0
    dulcolax_dayof_tablets: 1
    dulcolax_dayof_time: "12:00 PM"
    miralax_time: "1:00 PM"
    drink_cup_en: "3 oz (~90 mL)"
    drink_cup_es: "3 oz (~90 mL)"
    dulcolax_mg_total: 5
    miralax_capfuls: 5
    miralax_grams: 80
    miralax_note_en: ""
    miralax_note_es: ""
    gatorade_oz: 20
    precleanout_en: "1–2 capfuls (15–30 g) mixed into 8–16 oz of juice, water, or Gatorade"
    precleanout_es: "1–2 tapas (15–30 g) mezcladas en 8–16 oz de jugo, agua o Gatorade"
