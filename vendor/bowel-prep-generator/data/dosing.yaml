# Bowel prep dosing data — single source of truth for all handouts.
# Edit values here, then run render.py to regenerate HTML + DOCX (English + Spanish).
#
# Two protocols are supported:
#   - infant:    no oral prep (saline enema by staff); minimal fields
#   - standard:  Dulcolax + MiraLAX + Gatorade dosing
#
# Precleanout strings are stored as fully-formed localized sentences because
# their phrasing varies (e.g. "4 capfuls" vs "1–2 capfuls"). Dosing numbers
# are structured so render.py can assemble consistent wording per language.

bands:

  # =====================================================================
  # INFANT PROTOCOL
  # =====================================================================
  - id: "under-15"
    protocol: infant
    label_en: "Infants and Children Under 15 kg (<33 lb)"
    label_es: "Bebés y Niños Menores de 15 kg (<33 lb)"
    html_title_en: "Colonoscopy Prep — MiraLAX Option — Infants and Children Under 15 kg"
    html_title_es: "Preparación para Colonoscopia — Opción MiraLAX — Bebés y Niños Menores de 15 kg"
    # DOCX heading uses ASCII-flattened labels (matching existing DOCX encoding)
    docx_heading_en: "Infants and Children Under 15 kg (&lt;33 lb)"
    docx_heading_es: "Bebés y Niños Menores de 15 kg (&lt;33 lb)"
    mobile_path: "u15kgPEG"
    warning_weight_en: "15 kg"
    warning_weight_es: "15 kg"
    # Output filename stem (becomes bowel-prep-{filename_stem}-mobile.html, etc.)
    filename_stem: "under-15kg"
    folder_en: "Under 15 kg (Under 33 Lb)"
    folder_es: "Menos de 15 kg (Menos de 33 Lb)"
    include_glp1_warning: false
    # Cheat-sheet subtable rows. Mirrors the weight-banded MiraLAX dose table
    # on the patient handout (templates/colonoscopy-mobile-infant.en.html
    # lines 267-293). UTF-8 fractions are kept verbatim through render.
    cheat_sheet_subbands:
      - label_en: "<5 kg"
        miralax_capfuls_en: "¼"
        miralax_grams: 4
        mix_oz_en: "2–4 oz"
      - label_en: "5–9 kg"
        miralax_capfuls_en: "½"
        miralax_grams: 8.5
        mix_oz_en: "4–6 oz"
      - label_en: "10–15 kg"
        miralax_capfuls_en: "¾"
        miralax_grams: 13
        mix_oz_en: "6–8 oz"
    cheat_sheet_schedule_en: "1 dose/day × 2 days (days −3 and −2)"
    cheat_sheet_mix_vehicle_en: "Pedialyte or clear apple juice"

  - id: "under-15-enema"
    protocol: infant-enema
    label_en: "Infants and Children Under 15 kg (<33 lb)"
    label_es: "Bebés y Niños Menores de 15 kg (<33 lb)"
    html_title_en: "Colonoscopy Prep — Clear Liquids + Saline Enema Option — Infants and Children Under 15 kg"
    html_title_es: "Preparación para Colonoscopia — Opción Líquidos Claros + Enema — Bebés y Niños Menores de 15 kg"
    docx_heading_en: "Infants and Children Under 15 kg (&lt;33 lb)"
    docx_heading_es: "Bebés y Niños Menores de 15 kg (&lt;33 lb)"
    mobile_path: "u15kgEnema"
    warning_weight_en: "15 kg"
    warning_weight_es: "15 kg"
    filename_stem: "under-15kg-enema"
    folder_en: "Under 15 kg (Under 33 Lb)"
    folder_es: "Menos de 15 kg (Menos de 33 Lb)"
    include_glp1_warning: false
    # Cheat-sheet one-line summary. Source:
    # templates/colonoscopy-mobile-infant-enema.en.html lines 308-310.
    cheat_sheet_summary_en: "10 mL/kg — evening at home if directed, otherwise by staff at facility"

  # =====================================================================
  # STANDARD PROTOCOL
  # =====================================================================
  - id: "15-20"
    protocol: standard
    label_en: "15-20 kg (33-44 lb)"
    label_es: "15-20 kg (33-44 lb)"
    html_title_en: "Colonoscopy Bowel Preparation Instructions - Children 15-20 kg"
    html_title_es: "Instrucciones de Preparación Intestinal para Colonoscopia - Niños de 15-20 kg"
    docx_heading_en: "Children 15-20 kg (33-44 lb)"
    docx_heading_es: "Niños de 15-20 kg (33-44 lb)"
    mobile_path: "u20kg"
    filename_stem: "15-20kg"
    folder_en: "15-20 kg (33-44 Lb)"
    folder_es: "15-20 kg (33-44 Lb)"
    include_glp1_warning: false
    dulcolax_tablets: 1
    dulcolax_bedtime_tablets: 0
    dulcolax_dayof_tablets: 1
    dulcolax_dayof_time: "12:00 PM"
    miralax_time: "1:00 PM"
    drink_cup_en: "3 oz (~90 mL)"
    drink_cup_es: "3 oz (~90 mL)"
    dulcolax_mg_total: 5
    miralax_capfuls: 5
    miralax_grams: 80
    miralax_note_en: ""
    miralax_note_es: ""
    gatorade_oz: 20
    precleanout_en: "1–2 capfuls (15–30 g) mixed into 8–16 oz of juice, water, or Gatorade"
    precleanout_es: "1–2 tapas (15–30 g) mezcladas en 8–16 oz de jugo, agua o Gatorade"
    # Pre-cleanout for the HTML callout. Per 2026-05-08 clinical guidance,
    # the under-30 kg bands present the lower-dose × longer-duration option
    # only (no second option). The DOCX legacy string above is unchanged.
    precleanout_a_text_en: "<strong>1 capful</strong> in <strong>4 oz</strong> of clear liquid, <strong>once daily</strong> for <strong>5 days</strong>"
    precleanout_a_text_es: "<strong>1 tapa</strong> en <strong>4 oz</strong> de líquido claro, <strong>una vez al día</strong> durante <strong>5 días</strong>"
    precleanout_a_offset_days: -5
    precleanout_b_text_en: ""
    precleanout_b_text_es: ""
    precleanout_b_offset_days: null
    precleanout_maintenance_en: "Then continue prescribed daily laxatives, or at least <strong>½ capful of MiraLAX daily</strong>, until the procedure."
    precleanout_maintenance_es: "Luego continúe los laxantes diarios prescritos, o al menos <strong>½ tapa de MiraLAX diaria</strong>, hasta el procedimiento."
    # Backup plan if the BIG PREP isn't working — see build_contingency_block().
    contingency_trigger_hours: 4
    contingency_evening_caps: 2
    contingency_evening_oz: 8
    contingency_morning_caps: 1
    contingency_morning_oz: 4
    contingency_total_caps: 8
    contingency_total_grams: 136
    contingency_backup_en: "We may suggest a saline enema (10 mL/kg) at the facility, or rescheduling the procedure."
    contingency_backup_es: "Podemos sugerir un enema de solución salina (10 mL/kg) en el centro, o reprogramar el procedimiento."
    # §6 shopping volume (BIG PREP + worst-day extra). See build_strings().
    shopping_gatorade_oz: 32

