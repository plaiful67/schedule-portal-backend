# Bowel prep dosing data — single source of truth for all handouts.
# Edit values here, then run render.py to regenerate HTML + DOCX (English + Spanish).
#
# Two protocols are supported:
#   - infant:    no oral prep (saline enema by staff); minimal fields
#   - standard:  Dulcolax + MiraLAX + Gatorade dosing
#
# Precleanout strings are stored as fully-formed localized sentences because
# their phrasing varies (e.g. "4 capfuls" vs "1–2 capfuls"). Dosing numbers
# are structured so render.py can assemble consistent wording per language.

bands:

  # =====================================================================
  # INFANT PROTOCOL
  # =====================================================================
  - id: "under-15"
    protocol: infant
    label_en: "Infants and Children Under 15 kg (<33 lb)"
    label_es: "Bebés y Niños Menores de 15 kg (<33 lb)"
    html_title_en: "Colonoscopy Prep — MiraLAX Option — Infants and Children Under 15 kg"
    html_title_es: "Preparación para Colonoscopia — Opción MiraLAX — Bebés y Niños Menores de 15 kg"
    # DOCX heading uses ASCII-flattened labels (matching existing DOCX encoding)
    docx_heading_en: "Infants and Children Under 15 kg (&lt;33 lb)"
    docx_heading_es: "Bebés y Niños Menores de 15 kg (&lt;33 lb)"
    mobile_path: "u15kgPEG"
    warning_weight_en: "15 kg"
    warning_weight_es: "15 kg"
    # Output filename stem (becomes bowel-prep-{filename_stem}-mobile.html, etc.)
    filename_stem: "under-15kg"
    folder_en: "Under 15 kg (Under 33 Lb)"
    folder_es: "Menos de 15 kg (Menos de 33 Lb)"
    include_glp1_warning: false

  - id: "under-15-enema"
    protocol: infant-enema
    label_en: "Infants and Children Under 15 kg (<33 lb)"
    label_es: "Bebés y Niños Menores de 15 kg (<33 lb)"
    html_title_en: "Colonoscopy Prep — Clear Liquids + Saline Enema Option — Infants and Children Under 15 kg"
    html_title_es: "Preparación para Colonoscopia — Opción Líquidos Claros + Enema — Bebés y Niños Menores de 15 kg"
    docx_heading_en: "Infants and Children Under 15 kg (&lt;33 lb)"
    docx_heading_es: "Bebés y Niños Menores de 15 kg (&lt;33 lb)"
    mobile_path: "u15kgEnema"
    warning_weight_en: "15 kg"
    warning_weight_es: "15 kg"
    filename_stem: "under-15kg-enema"
    folder_en: "Under 15 kg (Under 33 Lb)"
    folder_es: "Menos de 15 kg (Menos de 33 Lb)"
    include_glp1_warning: false

  # =====================================================================
  # STANDARD PROTOCOL
  # =====================================================================
