# procedure.yaml — clinical/operational config for EGD handouts.
#
# `practice.yaml` holds branding/contact/QR-target URLs (logo, footer, YouTube,
# patient portal). This file holds everything procedure-specific: NPO timing,
# locations, mobile-site routing.
#
# Adding a new procedure (flex sig, capsule, etc.) later: add another entry
# under `procedures:` with the same shape, then build a per-procedure print
# template at templates/<id>-print.<lang>.html.

locations:
  scc:
    name_en: "Surgery Center of Carmel"
    name_es: "Surgery Center of Carmel"
    address: "12188-A N Meridian St #150, Carmel, IN 46032"
    phone: "(317) 569-8250"
    phone_label_en: "Surgery Center phone"
    phone_label_es: "Teléfono del Centro"
    arrival_en: "Arrive 1 hour before your scheduled procedure"
    arrival_es: "Llegue 1 hora antes de su procedimiento programado"
    maps_url_en: "https://maps.app.goo.gl/nD86YApcywibXFHfA"
    maps_url_es: "https://maps.app.goo.gl/nD86YApcywibXFHfA?hl=es"
    mobile_subdomain: "egd"        # → https://egd.giready.com/  (ES: /es/)
    # Per-location NPO clear-liquids cutoff (hours before arrival).
    # Overrides procedure.npo.clear_hours. SCC anesthesia signed off on 2 hr;
    # PMCH currently requires 3 hr per their preop guidelines.
    clear_hours: 2
  pmch:
    name_en: "St. Vincent Hospital — Pediatric Preop, Door #1"
    name_es: "Hospital St. Vincent — Preop Pediátrico, Puerta #1"
    address: "2001 W 86th St, Indianapolis, IN 46260 (Surgery Parking Lot)"
    phone: "(317) 338-5851"
    phone_label_en: "Pediatric Preop phone"
    phone_label_es: "Teléfono Preop Pediátrico"
    arrival_en: "Arrive 90 minutes before your scheduled procedure"
    arrival_es: "Llegue 90 minutos antes de su procedimiento programado"
    maps_url_en: "https://maps.app.goo.gl/Uq7do9hBrpttYxLQ8"
    maps_url_es: "https://maps.app.goo.gl/Uq7do9hBrpttYxLQ8?hl=es"
    mobile_subdomain: "egd86"      # → https://egd86.giready.com/  (ES: /es/)
    clear_hours: 3

# A `procedure` is one handout. Add `flex-sig`, `capsule`, etc. with the same
# shape when ready. Optional per-procedure `locations:` field restricts which
# locations the procedure is offered at (omit = both SCC and PMCH).
procedures:
  egd:
    label_en: "Upper Endoscopy (EGD)"
    label_es: "Endoscopia Superior (EGD)"
    html_title_en: "Upper Endoscopy (EGD) — What to Expect"
    html_title_es: "Endoscopia Superior (EGD) — Qué Esperar"

    # Used in a "your procedure takes about X minutes" narrative line.
    duration_min: 20

    # NPO timing — hours BEFORE scheduled arrival to stop each food/liquid type.
    # These are the PMCH preoperative outpatient guidelines.
    npo:
      solid_hours:       8
      formula_hours:     6
      breastmilk_hours:  4
      clear_hours:       2
      thickener_hours:   6

    # Future variant flag. When true, render adds a callout: "Off acid
    # suppressors (Prevacid, Prilosec, Nexium, Reglan, Erythromycin) for 5 days
    # prior; off Carafate or Tums one day prior." Default off — wired but unused
    # in v1; set to `true` when generating the impedance-probe variant later.
    impedance_probe_callout: false

    # Drive-folder routing for consolidate_handouts.py. The script auto-
    # discovers procedures by scanning procedure.yaml; new variants only
    # need these two fields (+ locations: if scoped) to be picked up.
    drive_folder: "EGD"            # subfolder under "{LOC} - {drive_folder}"
    drive_filename: "EGD"          # filename stem "{drive_filename} {LOC}[ ES].pdf"

    # affects_doses: set true when the procedure introduces new clinical
    # dosing that staff need at doses.giready.com (e.g., a new prep agent).
    # False for procedures that only change pre-procedure protocol (NPO, med
    # stops, recovery). A Tier-2 validator (not yet implemented) will warn
    # when this is true but doses-giready/ has no matching entry.
    affects_doses: false

  # EGD + 24-hr pH impedance monitoring (pH-MII). Always at PMCH because the
  # motility nurses are part of the adult-GI department and only staff 86th St.
  # See ~/.claude/projects/.../memory/project_pmch_only_procedures.md.
  egdph:
    label_en: "EGD + pH Impedance Monitoring"
    label_es: "EGD con monitoreo de impedancia-pH"
    html_title_en: "EGD + pH Impedance Monitoring — What to Expect"
    html_title_es: "EGD con monitoreo de impedancia-pH — Qué Esperar"

    # PMCH-only. Renderer skips the SCC outputs entirely when this is set.
    locations: [pmch]

    # Override the location's default mobile_subdomain (which is "egd86" for
    # PMCH on the EGD-only handout) — pH-MII has its own subdomain.
    mobile_subdomain: "egdph"

    # Procedure-specific YouTube video. Falls back to practice.yaml
    # qr_targets.youtube_url_* when unset. The default EGD video isn't
    # appropriate for the pH-MII combined case.
    youtube_url_en: "https://www.youtube.com/watch?v=1nq-8lGfgEU"
    youtube_url_es: "https://www.youtube.com/watch?v=1nq-8lGfgEU"

    # Procedure-specific GIKids reference page. Default points at the
    # generic upper-endoscopy page; the pH-MII handout sends families to
    # the impedance-study page instead.
    gikids_url: "https://gikids.org/tests-procedures/ph-impedance-study/"

    # EGD-portion duration; the probe placement adds <5 min. Total facility
    # stay is several hours; that's narrated separately in the template copy.
    duration_min: 20

    # Same pre-procedure NPO as the EGD-only handout.
    npo:
      solid_hours:       8
      formula_hours:     6
      breastmilk_hours:  4
      clear_hours:       2
      thickener_hours:   6

    impedance_probe_callout: true

    # Drive-folder routing — see comment on the egd block above.
    drive_folder: "EGDph"
    drive_filename: "EGDph"

    # pH-MII introduces no new clinical dosing — just a med-STOP list. The
    # dosing cheatsheet (doses.giready.com) doesn't need an egdph entry.
    affects_doses: false

# Medication-stop rules consumed by handouts that include a "Medications to
# Stop" table (currently the pH-MII variant). Each entry has `consumed_by` so
# we can later add more procedures without rewriting the renderer.
medication_stops:
  - id: ppi
    stop_days: 7
    consumed_by: [egdph]
    label_en: "Proton pump inhibitors (PPIs)"
    label_es: "Inhibidores de la bomba de protones (IBP)"
    examples_en: "omeprazole (Prilosec), esomeprazole (Nexium), lansoprazole (Prevacid), pantoprazole (Protonix), others"
    examples_es: "omeprazol (Prilosec), esomeprazol (Nexium), lansoprazol (Prevacid), pantoprazol (Protonix), otros"
  - id: h2_blocker
    stop_days: 3
    consumed_by: [egdph]
    label_en: "H2 blockers"
    label_es: "Bloqueadores H2"
    examples_en: "famotidine (Pepcid), others"
    examples_es: "famotidina (Pepcid), otros"
  - id: antacid
    stop_days: 3
    consumed_by: [egdph]
    label_en: "Antacids"
    label_es: "Antiácidos"
    examples_en: "Tums, Maalox, Mylanta"
    examples_es: "Tums, Maalox, Mylanta"
  - id: prokinetic
    stop_days: 3
    consumed_by: [egdph]
    label_en: "Prokinetics"
    label_es: "Procinéticos"
    examples_en: "metoclopramide (Reglan), erythromycin (when used for motility)"
    examples_es: "metoclopramida (Reglan), eritromicina (cuando se usa para motilidad)"
  - id: sucralfate
    stop_days: 3
    consumed_by: [egdph]
    label_en: "Sucralfate"
    label_es: "Sucralfato"
    examples_en: "Carafate"
    examples_es: "Carafate"
  - id: glp1
    stop_days: 7
    consumed_by: [egdph]
    label_en: "GLP-1 medications"
    label_es: "Medicamentos GLP-1"
    examples_en: "Ozempic, Wegovy, Mounjaro, Trulicity"
    examples_es: "Ozempic, Wegovy, Mounjaro, Trulicity"
  # action: continue — NOT stopped; named on the "Other medications" callout as
  # explicitly safe to keep taking (renders via {{MED_CONTINUE_NAMES}}, never a
  # stop-table row). Gaviscon is called out so families don't mistake it for the
  # antacids/alginates they must hold; ondansetron has no effect on pH-impedance.
  - id: alginate
    action: continue
    consumed_by: [egdph]
    name_en: "Gaviscon"
    name_es: "Gaviscon"
  - id: ondansetron
    action: continue
    consumed_by: [egdph]
    name_en: "ondansetron (Zofran)"
    name_es: "ondansetrón (Zofran)"

# ---------------------------------------------------------------------------
# Mandatory patient-action content (depth rule / no-under-description gate).
# Every handout that includes pH-MII must render this in FULL — it is exactly
# what a one-line "blurb" version omits. Asserted by
# scripts/verify_mandatory_actions.py across both the static egdph site and the
# scheduler's egd_phmii template, so an EGD + pH (+ team add-on) booking can
# never silently collapse pH to a single sentence again (the 2026-06 regression
# that prompted WS1). Markers are plain case-sensitive substrings.
mandatory_actions:
  egdph:
    # Section-level markers — present as static text on EVERY pH surface (these
    # are the sections a skimpy blurb drops).
    sections:
      - {en: "Returning the Device",        es: "Devolver el Dispositivo"}
      - {en: "diary",                       es: "diario"}
      - {en: "24-Hour Monitoring",          es: "Monitoreo de 24 Horas"}
      - {en: "Medications to Stop",          es: "Medicamentos a Suspender"}
    # Enriched med box (T3) — proven by RENDERED content where the table is baked
    # at build time (the static egdph site) ...
    med_box_rendered:
      - {en: "Sucralfate",                  es: "Sucralfato"}
      - {en: "can be continued as usual",   es: "continuarse como de costumbre"}
    # ... and by the render TOKENS where the table fills per-booking (the backend
    # egd_phmii template; the live EGD+pH smoke proves the filled rows).
    med_box_tokens:
      - "{{MED_STOPS_TBODY}}"
      - "{{MED_CONTINUE_NAMES}}"
