# practice.yaml — per-SKILL extras for the EGD (upper endoscopy) handouts.
#
# Practice-WIDE identity (phone, cover stack, footer, disclaimer, logo) lives in
# ONE place: ~/peds-gi-prep-system/shared/practice-core.yaml, deep-merged UNDER
# this file at render time (local keys win). Edit shared values there.
#
# This skill has no practice-level overrides today — it keeps only its
# EGD-specific QR targets and the DOCX Maps-QR anchor.

# Static QR targets — same target for both locations.
# Video URLs here are EGD-specific (the bowel-prep skill has its own colonoscopy
# prep video). When a Spanish-language EGD video is available, replace youtube_url_es.
qr_targets:
  youtube_url_en: "https://www.youtube.com/watch?v=1PrlgWWiJGc"
  youtube_url_es: "https://www.youtube.com/watch?v=1PrlgWWiJGc"
  portal_url:     "https://healthcare.ascension.org/patient-portal/indiana-ascension-st-vincent"
  gikids_url:     "https://gikids.org/tests-procedures/endoscopy-upper/"
  # Patient-facing medication checker — scanned/visited from the Medications
  # callout in the handout. Mirrors the scheduler-portal med list.
  meds_giready_url: "https://meds.giready.com"

# Maps URL embedded in the original DOCX templates' placeholder Maps QR PNG.
# render.py uses this for byte-match identification when swapping in per-location Maps QRs.
# Don't change this unless you regenerate the DOCX templates' Maps QR images.
template_defaults:
  scc_maps_url: "https://maps.app.goo.gl/nD86YApcywibXFHfA"
