<table class="npo">
  <thead>
    <tr>
      <th>Food or liquid</th>
      <th class="col-stop">Stop this many hours before arrival</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>Solid foods</td><td class="col-stop"><span class="stop-hours">{{NPO_SOLID}} hours</span></td></tr>
    <tr><td>Formula or milk feedings</td><td class="col-stop"><span class="stop-hours">{{NPO_FORMULA}} hours</span></td></tr>
    <tr><td>Breast milk</td><td class="col-stop"><span class="stop-hours">{{NPO_BREASTMILK}} hours</span></td></tr>
    <tr><td>Clear liquids <span class="note">(water, apple juice, plain Jell-O)</span></td><td class="col-stop"><span class="stop-hours">{{NPO_CLEAR}} hours</span></td></tr>
  </tbody>
</table>
