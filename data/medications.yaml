    hold_days: 7

  - id: celecoxib
    category: nsaids
    primary_name: "Celecoxib"
    search_aliases: ["celecoxib", "Celebrex"]
    hold_text: "Hold 7 days before procedure"
    hold_days: 7

  - id: meloxicam
    category: nsaids
