# Pre-Procedure Medication Hold List — Pediatric to Young Adult (0–25 years)
#
# Universal pre-anesthesia/sedation holds. Apply to all four procedures
# (bowel prep, EGD, combined EGD+colonoscopy, flex sig).
#
# English by default for EMR / scheduler use; the patient-facing site
# meds.giready.com renders the same data with a Spanish UI. Brand names
# are kept in their original form because families recognize the bottle
# label (Children's Motrin, Lovenox) more reliably than a translation.
#
# hold_days: numeric value used for sorting. 0 = day of procedure.
#   For ranges (e.g. "5-7 days"), use the upper bound.
# hold_text:  human-readable instruction printed on the handout.
# search_aliases: every brand + generic name; the frontend autocomplete
#   matches against this flattened list (case-insensitive substring).
# action:     hold | defer | continue | avoid | timed (default: hold).
#             `timed` is for drugs that aren't held outright but must be
#             spaced around each bowel-prep dose for CLENPIQ or SUPREP.
# colonoscopy_only: when true, the patient-facing site hides the row
#             unless the user picks "colonoscopy" in the procedure banner.
# timed_with_per_dose_window: when true, the patient-facing site shows
#             a per-dose timing callout for the affected drug when the
#             user selects CLENPIQ or SUPREP as their prep type. The
#             timing text is sourced from `prep_interaction_rulesets`.

version: 2

# -----------------------------------------------------------------------------
# Prep types — drive the prep-picker on meds.giready.com. The picker is
# revealed only after the user selects "Colonoscopy" in the procedure banner.
# `interaction_ruleset` keys into `prep_interaction_rulesets` below to surface
# per-dose drug-timing rules. MiraLAX + lactulose have no ruleset; CLENPIQ +
# SUPREP share the same `per_dose_window` ruleset from their FDA labels.
# -----------------------------------------------------------------------------
prep_types:
  - id: miralax
    label_en: "MiraLAX"
    label_es: "MiraLAX"
    is_default: true
  - id: lactulose
    label_en: "Lactulose"
    label_es: "Lactulosa"
  - id: clenpiq
    label_en: "CLENPIQ"
    label_es: "CLENPIQ"
    interaction_ruleset: per_dose_window
  - id: suprep
    label_en: "SUPREP"
    label_es: "SUPREP"
    interaction_ruleset: per_dose_window

prep_interaction_rulesets:
  # CLENPIQ + SUPREP share an identical FDA-label drug-interaction profile:
  # 6 specific drug classes need a 2 h-before / 6 h-after window around each
  # prep dose; all other oral medications need ≥1 h-before each dose.
  per_dose_window:
    timed_card:
      title_en: "Timing around each prep dose"
      title_es: "Tiempo alrededor de cada dosis de la preparación"
      body_en: "Take this medication at least <strong>2 hours BEFORE</strong> and <strong>not less than 6 hours AFTER</strong> each {prep_label} dose."
      body_es: "Administre este medicamento al menos <strong>2 horas ANTES</strong> y <strong>no menos de 6 horas DESPUÉS</strong> de cada dosis de {prep_label}."
    default_oral_meds_blackout:
      hours_before: 1
      banner_en: "Give other oral medications at least <strong>1 hour before</strong> each {prep_label} dose."
      banner_es: "Administre otros medicamentos orales al menos <strong>1 hora antes</strong> de cada dosis de {prep_label}."

categories:
  - { id: anticoagulants, label: "Anticoagulants / Antiplatelets" }
  - { id: diabetes_glp1,  label: "Diabetes & GLP-1 Receptor Agonists" }
  - { id: weight_loss,    label: "Weight Loss" }
  - { id: nsaids,         label: "Pain & Anti-Inflammatory (NSAIDs)" }
  - { id: stimulants,     label: "Stimulants / ADHD — Continue as Prescribed (NOT held)" }
  - { id: aeds,           label: "Anti-Epileptic Drugs — Continue as Prescribed (NOT held)" }
  - { id: mood_stabilizer, label: "Mood Stabilizers" }
  - { id: anti_diarrheals, label: "Anti-Diarrheal Medications", colonoscopy_only: true }
  - { id: iron,           label: "Iron Supplements", colonoscopy_only: true }
  - { id: fiber_bowel,    label: "Fiber & Bulk-Forming Supplements", colonoscopy_only: true }
  # New categories (2026-05-16) to support SUPREP / CLENPIQ drug-interaction
  # timing. Members are `action: timed` — they're continued for MiraLAX /
  # lactulose preps but spaced around each prep dose for CLENPIQ / SUPREP.
  - { id: antibiotics_tetracycline,    label: "Antibiotics — Tetracyclines" }
  - { id: antibiotics_fluoroquinolone, label: "Antibiotics — Fluoroquinolones" }
  - { id: cardiac_glycoside,           label: "Cardiac Glycosides" }
  - { id: antipsychotic_phenothiazine, label: "Antipsychotics — Phenothiazines" }
  - { id: chelating_agent,             label: "Chelating Agents" }

