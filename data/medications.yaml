  - id: methylphenidate
    category: stimulants
    primary_name: "Methylphenidate"
    search_aliases:
      - "methylphenidate"
      - "Ritalin"
      - "Ritalin LA"
      - "Concerta"
      - "Focalin"
      - "dexmethylphenidate"
      - "Focalin XR"
      - "Metadate CD"
